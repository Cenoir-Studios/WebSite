<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Latest news and development updates from Cenoir Studios.">
  <title>News — Cenoir Studios</title>
  <link rel="stylesheet" href="style.css"><link rel="icon" href="./assets/Logo.png" type="image/png">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo-link"><img src="./assets/Logo.png" alt="Cenoir Studios" class="logo"><span class="brand">Cenoir Studios</span></a>
    <nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="projects.html">Projects</a><a href="news.html" class="active">News</a><a href="careers.html">Careers</a></nav>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </header>

  <main class="page">
    <section class="news-hero"><div class="container"><div class="section-header reveal">
      <span class="section-label" data-c="hero.label"></span>
      <h1 class="section-title" style="font-size:clamp(2.4rem,5vw,3.5rem);" data-h="hero.title"></h1>
      <p class="section-desc" data-c="hero.description"></p>
    </div></div></section>

    <section class="section" style="padding-top:0;"><div class="container">
      <div id="news-feed" class="news-feed"></div>
    </div></section>
  </main>

  <footer class="footer"><div class="footer-inner">
    <div class="footer-brand"><img src="./assets/Logo.png" alt="Cenoir"><span>Cenoir Studios</span><div class="footer-social footer-social-slot"></div></div>
    <div class="footer-columns">
      <div class="footer-col"><h4>Studio</h4><a href="about.html">About</a><a href="projects.html">Projects</a><a href="news.html">News</a><a href="careers.html">Careers</a></div>
      <div class="footer-col"><h4>Contact</h4><a data-email="contact"></a><a data-email="careers"></a><a data-email="support"></a></div>
      <div class="footer-col"><h4>Other</h4><a data-email="social"></a><a data-email="legal"></a></div>
    </div>
    <p class="footer-copy" data-c="copyright"></p>
  </div></footer>

  <script src="content-data.js"></script>
  <script src="content-loader.js"></script>
  <script src="main.js"></script>
  <script>
    (() => {
      const data = CL.load('news.json'), shared = CL.load('shared.json');
      CL.bind(data);
      CL.renderFooter(shared);

      const feed = document.getElementById('news-feed');
      (data.entries || []).forEach((e, i) => {
        const d = document.createElement('div');
        d.className = 'news-item reveal' + (i ? ' reveal-delay-' + Math.min(i, 4) : '');
        d.innerHTML = '<div class="news-date-block"><span class="news-day">' + e.day + '</span><span class="news-month">' + e.month + '</span></div>'
          + '<div class="news-body"><h3>' + e.title + '</h3><p>' + e.text + '</p></div>'
          + '<span class="news-tag">' + e.tag + '</span>';
        feed.appendChild(d);
      });

      reInitReveal();
      CL.fixImages();
    })();
  </script>
</body>
</html>
