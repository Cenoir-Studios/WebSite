<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NoSaints: New Dawn — a narrative-driven FPS by Cenoir Studios.">
  <title>Projects — Cenoir Studios</title>
  <link rel="stylesheet" href="style.css"><link rel="icon" href="./assets/Logo.png" type="image/png">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo-link"><img src="./assets/Logo.png" alt="Cenoir Studios" class="logo"><span class="brand">Cenoir Studios</span></a>
    <nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="projects.html" class="active">Projects</a><a href="news.html">News</a><a href="careers.html">Careers</a></nav>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </header>

  <main class="page">
    <section class="project-hero"><div class="container"><div class="section-header reveal">
      <span class="section-label" data-c="hero.label"></span>
      <h1 class="section-title" style="font-size:clamp(2.4rem,5vw,3.5rem);" data-h="hero.title"></h1>
    </div></div></section>

    <section class="section" style="padding-top:0;"><div class="container container--wide">
      <div class="project-showcase reveal">
        <div class="project-top">
          <div class="project-info-panel">
            <h2 data-c="nosains.title"></h2>
            <span class="project-subtitle" data-c="nosains.subtitle"></span>
            <p data-c="nosains.description"></p>
            <p style="color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.75;" data-c="nosains.tech"></p>
            <div id="project-tags" class="project-tags"></div>
            <div class="project-actions">
              <button class="btn btn--primary" data-download-trigger>▶ Download Build</button>
              <a class="btn btn--ghost btn--small" href="news.html">Dev Updates →</a>
            </div>
          </div>
          <div class="carousel-panel">
            <div id="carousel-track" class="carousel-track"></div>
            <div class="carousel-controls"><button class="carousel-btn carousel-prev" aria-label="Previous">‹</button><button class="carousel-btn carousel-next" aria-label="Next">›</button></div>
            <div id="carousel-dots" class="carousel-dots"></div>
          </div>
        </div>
        <div class="gallery-section">
          <p class="gallery-label">Concept Art Gallery</p>
          <div id="gallery-grid" class="gallery-grid"></div>
        </div>
      </div>
    </div></section>
  </main>

  <div id="download-modal" class="modal-overlay"><div class="modal-box">
    <button class="modal-close" aria-label="Close">✕</button>
    <h3>Download NoSaints</h3><p>Choose your platform to download the latest build.</p>
    <div id="platform-options" class="platform-options"></div>
  </div></div>

  <div id="lightbox" class="lightbox"><button class="lightbox-close" aria-label="Close">✕</button><img src="" alt="Enlarged concept art"></div>

  <footer class="footer"><div class="footer-inner">
    <div class="footer-brand"><img src="./assets/Logo.png" alt="Cenoir"><span>Cenoir Studios</span><div class="footer-social footer-social-slot"></div></div>
    <div class="footer-columns">
      <div class="footer-col"><h4>Studio</h4><a href="about.html">About</a><a href="projects.html">Projects</a><a href="news.html">News</a><a href="careers.html">Careers</a></div>
      <div class="footer-col"><h4>Contact</h4><a data-email="contact"></a><a data-email="careers"></a><a data-email="support"></a></div>
      <div class="footer-col"><h4>Other</h4><a data-email="social"></a><a data-email="legal"></a></div>
    </div>
    <p class="footer-copy" data-c="copyright"></p>
  </div></footer>

  <script src="content-data.js"></script>
  <script src="content-loader.js"></script>
  <script src="main.js"></script>
  <script>
    (() => {
      const data = CL.load('projects.json'), shared = CL.load('shared.json');
      CL.bind(data);
      CL.renderFooter(shared);

      const ns = data.nosains;
      const tagBox = document.getElementById('project-tags');
      ns.tags.forEach(t => { const s = document.createElement('span'); s.textContent = t; tagBox.appendChild(s); });

      const track = document.getElementById('carousel-track');
      const dots = document.getElementById('carousel-dots');
      const gallery = document.getElementById('gallery-grid');
      ns.gallery.forEach((img, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = '<img src="' + img.src + '" alt="' + img.alt + '">';
        track.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', 'Slide ' + (i + 1));
        dots.appendChild(dot);

        const thumb = document.createElement('div');
        thumb.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
        thumb.setAttribute('data-lightbox', img.src);
        thumb.innerHTML = '<img src="' + img.src + '" alt="Thumb ' + (i + 1) + '">';
        gallery.appendChild(thumb);
      });

      const platforms = [
        { icon: '🪟', name: 'Windows', arch: 'x64 · .zip', url: ns.downloads.windows },
        { icon: '🍎', name: 'macOS', arch: 'Universal · .zip', url: ns.downloads.mac },
        { icon: '🐧', name: 'Linux', arch: 'x86_64 · .zip', url: ns.downloads.linux }
      ];
      const platBox = document.getElementById('platform-options');
      platforms.forEach(p => {
        const a = document.createElement('a');
        a.className = 'platform-btn';
        a.href = p.url;
        a.target = '_blank';
        a.innerHTML = '<span class="platform-icon">' + p.icon + '</span><span class="platform-name">' + p.name + '</span><span class="platform-arch">' + p.arch + '</span>';
        platBox.appendChild(a);
      });

      // Re-init carousel and lightbox after dynamic content
      const slides = track.querySelectorAll('.carousel-slide');
      const allDots = dots.querySelectorAll('.carousel-dot');
      const thumbs = gallery.querySelectorAll('.gallery-thumb');
      let cur = 0, timer;
      function goTo(i) {
        cur = ((i % slides.length) + slides.length) % slides.length;
        track.style.transform = 'translateX(-' + (cur * 100) + '%)';
        allDots.forEach((d, j) => d.classList.toggle('active', j === cur));
        thumbs.forEach((t, j) => t.classList.toggle('active', j === cur));
        clearInterval(timer); timer = setInterval(() => goTo(cur + 1), 5000);
      }
      document.querySelector('.carousel-prev').addEventListener('click', () => goTo(cur - 1));
      document.querySelector('.carousel-next').addEventListener('click', () => goTo(cur + 1));
      allDots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));
      thumbs.forEach((t, i) => t.addEventListener('click', () => goTo(i)));
      timer = setInterval(() => goTo(cur + 1), 5000);

      // Lightbox for dynamically added thumbs
      const lb = document.getElementById('lightbox');
      const lbImg = lb.querySelector('img');
      gallery.querySelectorAll('[data-lightbox]').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); lbImg.src = el.dataset.lightbox; lb.classList.add('open'); });
      });

      reInitReveal();
      CL.fixImages();
    })();
  </script>
</body>
</html>
