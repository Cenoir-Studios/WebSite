<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="About Cenoir Studios — our team, our journey, and why we make the games we make.">
  <title>About — Cenoir Studios</title>
  <link rel="stylesheet" href="style.css"><link rel="icon" href="./assets/Logo.png" type="image/png">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo-link"><img src="./assets/Logo.png" alt="Cenoir Studios" class="logo"><span class="brand">Cenoir Studios</span></a>
    <nav class="nav-links"><a href="index.html">Home</a><a href="about.html" class="active">About</a><a href="projects.html">Projects</a><a href="news.html">News</a><a href="careers.html">Careers</a></nav>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </header>

  <main class="page">
    <section class="about-hero"><div class="container"><div class="section-header reveal">
      <span class="section-label" data-c="hero.label"></span>
      <h1 class="section-title" style="font-size:clamp(2.4rem,5vw,3.5rem);" data-h="hero.title"></h1>
      <p class="section-desc" style="max-width:620px;" data-c="hero.description"></p>
    </div></div></section>

    <section class="section" style="padding-top:0;"><div class="container">
      <div id="about-cards" class="about-grid"></div>
      <div id="about-values" class="value-strip"></div>
    </div></section>

    <section class="section" style="background:linear-gradient(to bottom,transparent,rgba(212,137,42,0.03),transparent);"><div class="container">
      <div class="section-header reveal">
        <span class="section-label" data-c="journey.label"></span>
        <h2 class="section-title" data-c="journey.title"></h2>
        <p class="section-desc" data-c="journey.description"></p>
      </div>
      <div id="timeline" class="timeline reveal"></div>

      <div style="margin-top:4rem;" class="reveal">
        <div class="section-header">
          <span class="section-label" data-c="trailers.label"></span>
          <h2 class="section-title" data-c="trailers.title"></h2>
          <p class="section-desc" data-c="trailers.description"></p>
        </div>
        <div id="trailer-grid" class="video-grid"></div>
      </div>
    </div></section>

    <section class="section"><div class="container">
      <div class="section-header reveal">
        <span class="section-label" data-c="team.label"></span>
        <h2 class="section-title" data-c="team.title"></h2>
        <p class="section-desc" data-c="team.description"></p>
      </div>
      <div id="team-departments"></div>
    </div></section>
  </main>

  <footer class="footer"><div class="footer-inner">
    <div class="footer-brand"><img src="./assets/Logo.png" alt="Cenoir"><span>Cenoir Studios</span><div class="footer-social footer-social-slot"></div></div>
    <div class="footer-columns">
      <div class="footer-col"><h4>Studio</h4><a href="about.html">About</a><a href="projects.html">Projects</a><a href="news.html">News</a><a href="careers.html">Careers</a></div>
      <div class="footer-col"><h4>Contact</h4><a data-email="contact"></a><a data-email="careers"></a><a data-email="support"></a></div>
      <div class="footer-col"><h4>Other</h4><a data-email="social"></a><a data-email="legal"></a></div>
    </div>
    <p class="footer-copy" data-c="copyright"></p>
  </div></footer>

  <script src="content-data.js"></script>
  <script src="content-loader.js"></script>
  <script src="main.js"></script>
  <script>
    (() => {
      const data = CL.load('about.json'), shared = CL.load('shared.json');
      CL.bind(data);
      CL.renderFooter(shared);

      const cardsBox = document.getElementById('about-cards');
      (data.cards || []).forEach((card, i) => {
        const d = document.createElement('div');
        d.className = 'card reveal' + (i ? ' reveal-delay-' + i : '');
        d.innerHTML = '<h3>' + card.title + '</h3>' + card.paragraphs.map(p => '<p>' + p + '</p>').join('');
        cardsBox.appendChild(d);
      });

      const valBox = document.getElementById('about-values');
      (data.values || []).forEach((v, i) => {
        const d = document.createElement('div');
        d.className = 'value-item reveal' + (i ? ' reveal-delay-' + i : '');
        d.innerHTML = '<span class="value-icon">' + v.icon + '</span><h4>' + v.title + '</h4><p>' + v.text + '</p>';
        valBox.appendChild(d);
      });

      const tlBox = document.getElementById('timeline');
      (data.journey.milestones || []).forEach(m => {
        const d = document.createElement('div');
        d.className = 'timeline-item';
        d.innerHTML = '<span class="timeline-year">' + m.year + '</span><h3>' + m.title + '</h3><p>' + m.text + '</p>';
        tlBox.appendChild(d);
      });

      const vidBox = document.getElementById('trailer-grid');
      (data.trailers.videos || []).forEach(v => {
        const a = document.createElement('a');
        a.href = 'https://youtu.be/' + v.id;
        a.target = '_blank';
        a.className = 'video-thumb';
        a.innerHTML = '<img src="https://img.youtube.com/vi/' + v.id + '/hqdefault.jpg" alt="' + v.caption + '">'
          + '<div class="video-play-btn"><svg viewBox="0 0 68 48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55C3.97 2.33 2.27 4.81 1.48 7.74.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="white"/></svg></div>'
          + '<span class="video-label">' + v.caption + '</span>';
        vidBox.appendChild(a);
      });

      const deptBox = document.getElementById('team-departments');
      (data.team.departments || []).forEach((dept, di) => {
        const sec = document.createElement('div');
        sec.className = 'team-department reveal' + (di ? ' reveal-delay-' + di : '');
        sec.innerHTML = '<h3 class="team-dept-label">' + dept.name + '</h3><div class="team-grid"></div>';
        const grid = sec.querySelector('.team-grid');
        dept.members.forEach(m => {
          const card = document.createElement('div');
          card.className = 'team-member';
          card.innerHTML = '<div class="team-avatar" data-photo="' + m.photo + '"><div class="team-avatar-placeholder">' + m.initials + '</div></div>'
            + '<div class="team-name">' + m.name + '</div>'
            + '<div class="team-role">' + m.role + '</div>'
            + '<div class="team-fav">Favorite games: ' + m.games + '</div>';
          grid.appendChild(card);
          CL.probePhoto(card.querySelector('.team-avatar'), m.photo);
        });
        deptBox.appendChild(sec);
      });

      reInitReveal();
      CL.fixImages();
    })();
  </script>
</body>
</html>
